<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOBAK CHAT | SOON</title>
    <style>
        /* Temel Ayarlar */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Dalgalanan Bayrak Arka Planı */
        .flag-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            /* Karartma katmanı - yazıların okunması için */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5));
        }

        .flag-image {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Dalgalanma Efekti Animasyonu */
            animation: wave 8s ease-in-out infinite alternate;
            filter: brightness(0.7);
        }

        @keyframes wave {
            0% { transform: scale(1.0) translateX(0); }
            100% { transform: scale(1.1) translateX(-20px); }
        }

        /* İçerik Alanı */
        .content {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            z-index: 1;
        }

        h1 {
            font-size: 4rem;
            margin: 0;
            letter-spacing: 5px;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.8);
            text-transform: uppercase;
        }

        .sub-text {
            font-size: 1.5rem;
            margin: 10px 0 30px 0;
            opacity: 0.9;
            letter-spacing: 2px;
        }

        /* Geri Sayım Sayacı */
        #countdown {
            display: flex;
            gap: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        .time-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 80px;
        }

        .time-box span:first-child {
            font-size: 3rem;
            font-weight: bold;
            color: #ff4d4d;
        }

        .time-box span:last-child {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #ccc;
        }

        .creator {
            margin-top: 50px;
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 1px;
            background: rgba(255,255,255,0.1);
            padding: 5px 15px;
            border-radius: 50px;
        }

        /* Mobil Uyumluluk */
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            #countdown { gap: 10px; padding: 15px; }
            .time-box { min-width: 50px; }
            .time-box span:first-child { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="flag-container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/b/b4/Flag_of_Turkey.svg" class="flag-image" alt="Türk Bayrağı">
    </div>

    <div class="content">
        <h1>GOBAK CHAT</h1>
        <div class="sub-text">SOON.</div>

        <div id="countdown">
            <div class="time-box">
                <span id="days">00</span>
                <span>Gün</span>
            </div>
            <div class="time-box">
                <span id="hours">00</span>
                <span>Saat</span>
            </div>
            <div class="time-box">
                <span id="minutes">00</span>
                <span>Dakika</span>
            </div>
            <div class="time-box">
                <span id="seconds">00</span>
                <span>Saniye</span>
            </div>
        </div>

        <div class="creator">By: ömerbabapiromax</div>
    </div>

    <script>
        // Hedef süreyi şu andan itibaren 5 gün sonrasına kuruyoruz
        const targetDate = new Date();
        targetDate.setDate(targetDate.getDate() + 5);

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            // Zaman hesaplamaları
            const d = Math.floor(distance / (1000 * 60 * 60 * 24));
            const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((distance % (1000 * 60)) / 1000);

            // Ekrana yazdırma (0 ekleyerek formatlıyoruz)
            document.getElementById("days").innerText = d < 10 ? "0" + d : d;
            document.getElementById("hours").innerText = h < 10 ? "0" + h : h;
            document.getElementById("minutes").innerText = m < 10 ? "0" + m : m;
            document.getElementById("seconds").innerText = s < 10 ? "0" + s : s;

            // Süre bittiğinde
            if (distance < 0) {
                clearInterval(interval);
                document.getElementById("countdown").innerHTML = "<h2 style='color:#ff4d4d'>AÇILDI!</h2>";
            }
        }

        // Her saniye güncelle
        const interval = setInterval(updateCountdown, 1000);
        updateCountdown(); // İlk açılışta hemen çalıştır
    </script>
</body>
</html>
