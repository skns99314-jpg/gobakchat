<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL_ACCESS</title>
    <style>
        body {
            background-color: #050505;
            color: #00FF41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-shadow: 0 0 5px #00FF41;
        }
        .matrix-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.1;
        }
        .terminal {
            width: 80%;
            max-width: 800px;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #00FF41;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
        }
        .line {
            margin-bottom: 10px;
            white-space: nowrap;
            overflow: hidden;
            border-right: 2px solid #00FF41;
            animation: typing 3.5s steps(40, end), blink-caret .75s step-end infinite;
        }
        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }
        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: #00FF41 }
        }
    </style>
</head>
<body>
    <div class="terminal">
        <div class="line">> SİSTEME GİRİŞ YAPILIYOR...</div>
        <div class="line">> ERİŞİM ONAYLANDI: ECHO_PROTOCOL</div>
        <div class="line">> VERİ TABANI ŞİFRELERİ ÇÖZÜLÜYOR...</div>
        <div class="line">> [####################] 100%</div>
        <div class="line">> HOŞ GELDİN, DÜNYANIN HAKİMİ.</div>
    </div>
</body>
</html>
