<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOBAK_CHASE // YAKALAYABİLİRSEN YAKALA</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@700&display=swap');

        body {
            margin: 0;
            background-color: #0a0a0a;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 500px;
            background: linear-gradient(to bottom, #111 0%, #222 50%, #111 100%);
            border: 4px solid #bc13fe;
            box-shadow: 0 0 30px rgba(188, 19, 254, 0.4);
            overflow: hidden;
        }

        /* YOL ÇİZGİLERİ */
        .road-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.05);
            top: 50%;
        }

        /* ANA KARAKTER (AVCI) */
        #player {
            position: absolute;
            width: 50px;
            height: 50px;
            background: #00d2ff;
            border-radius: 8px;
            box-shadow: 0 0 20px #00d2ff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.8rem;
            z-index: 10;
            transition: transform 0.1s;
        }

        /* KAÇAN KARAKTER (GOBAK) */
        #target {
            position: absolute;
            width: 80px;
            height: 40px;
            background: #ff003c;
            border: 2px solid #fff;
            box-shadow: 0 0 25px #ff003c;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            color: #fff;
            border-radius: 4px;
            z-index: 5;
        }

        /* SKOR PANALİ */
        #hud {
            width: 800px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .instructions {
            margin-top: 15px;
            color: #888;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div id="hud">
        <div>Skor: <span id="score">0</span></div>
        <div style="color: #ff003c;">HEDEF: GOBAK</div>
    </div>

    <div id="game-container">
        <div class="road-line"></div>
        <div id="player">SİZ</div>
        <div id="target">GOBAK</div>
    </div>

    <div class="instructions">Yön tuşları veya WASD ile hareket et. GOBAK'ı yakala!</div>

    <script>
        const container = document.getElementById('game-container');
        const player = document.getElementById('player');
        const target = document.getElementById('target');
        const scoreElement = document.getElementById('score');

        let score = 0;
        let playerX = 50;
        let playerY = 225;
        let targetX = 600;
        let targetY = 225;

        let targetSpeedX = 3;
        let targetSpeedY = 3;
        
        const keys = {};

        // TUŞ KONTROLLERİ
        document.addEventListener('keydown', (e) => keys[e.code] = true);
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        function update() {
            // OYUNCU HAREKETİ
            const speed = 5;
            if ((keys['ArrowUp'] || keys['KeyW']) && playerY > 0) playerY -= speed;
            if ((keys['ArrowDown'] || keys['KeyS']) && playerY < 450) playerY += speed;
            if ((keys['ArrowLeft'] || keys['KeyA']) && playerX > 0) playerX -= speed;
            if ((keys['ArrowRight'] || keys['KeyD']) && playerX < 750) playerX += speed;

            // GOBAK HAREKETİ (YAPAY ZEKA - KAÇIŞ)
            // Oyuncudan uzaklaşmaya çalışır
            if (playerX < targetX) targetX += targetSpeedX;
            else targetX -= targetSpeedX;

            if (playerY < targetY) targetY += targetSpeedY;
            else targetY -= targetSpeedY;

            // Duvarlara çarpma kontrolü (Sekme)
            if (targetX <= 0 || targetX >= 720) targetX = Math.random() * 700;
            if (targetY <= 0 || targetY >= 460) targetY = Math.random() * 400;

            // Rastgele yön değiştirme (Tahmin edilemezlik)
            if(Math.random() > 0.98) {
                targetSpeedX = (Math.random() * 6) + 2;
                targetSpeedY = (Math.random() * 6) + 2;
            }

            // GÖRSEL GÜNCELLEME
            player.style.left = playerX + 'px';
            player.style.top = playerY + 'px';
            target.style.left = targetX + 'px';
            target.style.top = targetY + 'px';

            // ÇARPIŞMA KONTROLÜ (YAKALAMA)
            let dx = playerX - targetX;
            let dy = playerY - targetY;
            let distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < 50) {
                score++;
                scoreElement.innerText = score;
                // Yakalandığında rastgele bir yere ışınlan
                targetX = Math.random() * 700;
                targetY = Math.random() * 400;
                // Zorluğu artır
                targetSpeedX += 0.2;
                targetSpeedY += 0.2;
                
                // Efekt
                container.style.borderColor = '#00d2ff';
                setTimeout(() => container.style.borderColor = '#bc13fe', 200);
            }

            requestAnimationFrame(update);
        }

        update();
    </script>
</body>
</html>
