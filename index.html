<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOBAK CHAT | SOON</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        /* --- CSS Reset & Base --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Poppins', sans-serif;
            background-color: #000;
            color: white;
            overflow: hidden;
        }

        /* --- Sabit Türk Bayrağı Arka Planı --- */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            /* Karartma ve Sabit Bayrak */
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('https://upload.wikimedia.org/wikipedia/commons/b/b4/Flag_of_Turkey.svg') center/cover no-repeat;
        }

        /* --- Canlı İzleyici (Live Viewers) --- */
        .live-status {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 15px;
            border-radius: 50px;
            border: 1px solid rgba(255, 0, 0, 0.5);
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 10;
        }

        .dot {
            height: 8px;
            width: 8px;
            background-color: #ff0000;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px #ff0000;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        /* --- Ana İçerik --- */
        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        h1 {
            font-family: 'Oswald', sans-serif;
            font-size: clamp(3rem, 10vw, 6rem);
            letter-spacing: 8px;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
            margin-bottom: 5px;
        }

        .soon-tag {
            font-size: 1.2rem;
            letter-spacing: 12px;
            color: #ff4d4d;
            margin-bottom: 40px;
            font-weight: 300;
        }

        /* --- Geri Sayım --- */
        .countdown-wrapper {
            display: flex;
            gap: 20px;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .box {
            display: flex;
            flex-direction: column;
            min-width: 80px;
        }

        .number {
            font-family: 'Oswald', sans-serif;
            font-size: 3.5rem;
            color: #fff;
        }

        .label {
            font-size: 0.7rem;
            color: #aaa;
            letter-spacing: 2px;
        }

        .creator {
            margin-top: 50px;
            font-size: 1rem;
            color: rgba(255,255,255,0.5);
        }

        .creator strong { color: #fff; text-shadow: 0 0 5px rgba(255,255,255,0.5); }

        /* Mobil Ayar */
        @media (max-width: 600px) {
            .countdown-wrapper { gap: 10px; padding: 15px; }
            .number { font-size: 2rem; }
            .box { min-width: 50px; }
        }
    </style>
</head>
<body>

    <div class="background-container"></div>

    <div class="live-status">
        <span class="dot"></span>
        <span id="viewerCount">Giriş yapılıyor...</span>
    </div>

    <div class="container">
        <h1>GOBAK CHAT</h1>
        <div class="soon-tag">SOON.</div>

        <div class="countdown-wrapper">
            <div class="box"><span class="number" id="days">00</span><span class="label">GÜN</span></div>
            <div class="box"><span class="number" id="hours">00</span><span class="label">SAAT</span></div>
            <div class="box"><span class="number" id="mins">00</span><span class="label">DAKİKA</span></div>
            <div class="box"><span class="number" id="secs">00</span><span class="label">SANİYE</span></div>
        </div>

        <div class="creator">By: <strong>ömerbabapiromax</strong></div>
    </div>

    <script>
        // --- GERÇEKÇİ İZLEYİCİ SAYACI ---
        function updateViewers() {
            // Rastgele ama gerçekçi bir sayı (Örn: 100-150 arası)
            let count = Math.floor(Math.random() * (150 - 100 + 1)) + 100;
            document.getElementById('viewerCount').innerText = count + " KİŞİ İZLİYOR";
        }
        setInterval(updateViewers, 5000);
        updateViewers();

        // --- GERİ SAYIM (5 GÜN) ---
        const target = new Date();
        target.setDate(target.getDate() + 5);

        function count() {
            const now = new Date().getTime();
            const diff = target - now;

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('days').innerText = d.toString().padStart(2, '0');
            document.getElementById('hours').innerText = h.toString().padStart(2, '0');
            document.getElementById('mins').innerText = m.toString().padStart(2, '0');
            document.getElementById('secs').innerText = s.toString().padStart(2, '0');
        }
        setInterval(count, 1000);
        count();
    </script>
</body>
</html>
