<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SİSTEM_GÜNCELLEME // KURUMSAL_ERİŞİM</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* MEB KORUMA KALKANI - Gizli bir 'Acil Durum' butonu */
        #panic-button {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            z-index: 9999;
            cursor: pointer;
        }
        #panic-button:hover { background: rgba(255,255,255,0.1); }

        /* TIKTOK AYNA ALANI */
        .mirror-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        #tiktok-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* SAHTE YÜKLENİYOR EKRANI (MEB LOGOLU) */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: 0.5s;
        }
    </style>
</head>
<body>

    <!-- Bir öğretmen gelirse buraya tıkla, anında Google Eğitim açılır -->
    <div id="panic-button" onclick="panic()"></div>

    <div id="loader">
        <img src="https://upload.wikimedia.org/wikipedia/tr/b/bc/T.C._Mill%C3%AE_E%C4%9Fitim_Bakanl%C4%B1%C4%9F%C4%B1_logo.png" width="100">
        <p style="font-family: sans-serif; color: #666; margin-top: 20px;">Eğitim İçerikleri Senkronize Ediliyor...</p>
    </div>

    <div class="mirror-container">
        <!-- Gerçek TikTok Akışı (Explore Sayfası) -->
        <iframe 
            id="tiktok-frame" 
            src="https://www.tiktok.com/embed/v2/explore?lang=tr-TR" 
            allow="autoplay; encrypted-media; fullscreen"
            onload="hideLoader()">
        </iframe>
    </div>

    <script>
        function hideLoader() {
            setTimeout(() => {
                document.getElementById('loader').style.opacity = "0";
                setTimeout(() => {
                    document.getElementById('loader').style.display = "none";
                }, 500);
            }, 1500);
        }

        function panic() {
            window.location.href = "https://www.google.com/search?q=eba+giriş";
        }

        // Akıllı tahta için dokunmatik kaydırma simülasyonu fısıltısı
        console.log("PHANTOM_BYPASS: TikTok Engine Active.");
    </script>
</body>
</html>
