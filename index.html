<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>GOBAK_TIKTOK_STREAM_V10</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; overflow: hidden; }
        
        /* ANA EKRAN */
        .app-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* TIKTOK KUTUSU (MOBIL BOYUT) */
        .phone-frame {
            width: 450px; /* Bilgisayarda tam düzgün görünmesi için ideal boyut */
            height: 90vh;
            border: 10px solid #222;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(254, 44, 85, 0.5);
            background: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* GİZLİ REFRESH TUŞU */
        #refresh {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #fe2c55;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 15px #fe2c55;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="phone-frame">
            <iframe 
                id="gobak-stream"
                src="https://www.tiktok.com/embed/v2/explore?lang=tr-TR"
                allow="autoplay; encrypted-media; fullscreen"
                allowfullscreen>
            </iframe>
        </div>
    </div>

    <button id="refresh" onclick="location.reload()">🔄</button>

    <script>
        // Sayfa her yüklendiğinde farklı videoların gelmesi için 
        // TikTok'un cache (önbellek) sistemini küçük bir hileyle atlıyoruz
        const frame = document.getElementById('gobak-stream');
        frame.src = frame.src + "&t=" + new Date().getTime();
    </script>
</body>
</html>
