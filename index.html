<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>GOBAK_RUNNER // ULTIMATE_CHASE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap');
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; }
        
        #game-ui {
            position: absolute; width: 100%; top: 20px; display: flex;
            justify-content: space-around; color: #00ff41; z-index: 100;
            text-shadow: 0 0 10px #00ff41; font-size: 24px;
        }

        #game-canvas { display: block; }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 30%, #000 100%);
            pointer-events: none; z-index: 50;
        }

        #game-over {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #ff003c; font-size: 50px; display: none; z-index: 200; text-align: center;
        }
    </style>
</head>
<body>

    <div id="game-ui">
        <div>SCORE: <span id="score">0</span></div>
        <div>TARGET: GOBAK</div>
    </div>

    <div id="game-over">
        BREACH FAILED<br>
        <span style="font-size: 20px; color: #fff;">PRESS 'R' TO REBOOT</span>
    </div>

    <div class="overlay"></div>
    <canvas id="game-canvas"></canvas>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const gameOverEl = document.getElementById('game-over');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let isGameOver = false;
        let speed = 8;
        let playerLane = 1; // 0: Sol, 1: Orta, 2: Sağ
        const lanes = [canvas.width * 0.35, canvas.width * 0.5, canvas.width * 0.65];
        
        let obstacles = [];
        let particles = [];

        // KARAKTERLER
        const player = { x: lanes[1], y: canvas.height - 150, size: 40 };

        class Obstacle {
            constructor() {
                this.lane = Math.floor(Math.random() * 3);
                this.z = 0; // Derinlik simülasyonu
                this.y = canvas.height * 0.4;
                this.width = 10;
                this.height = 10;
                this.passed = false;
                this.isGobak = Math.random() > 0.8; // Bazen hedef GOBAK çıkar
            }

            update() {
                this.z += speed;
                let scale = this.z / 400;
                this.width = 20 * scale;
                this.height = 40 * scale;
                
                // Perspektif hesaplama
                let targetX = lanes[this.lane];
                let centerX = canvas.width / 2;
                this.currentX = centerX + (targetX - centerX) * scale;
                this.currentY = (canvas.height * 0.4) + (this.z * 1.5);
            }

            draw() {
                ctx.shadowBlur = 15;
                if (this.isGobak) {
                    ctx.fillStyle = "#bc13fe";
                    ctx.shadowColor = "#bc13fe";
                    ctx.fillRect(this.currentX - this.width/2, this.currentY - this.height, this.width, this.height);
                    ctx.fillStyle = "#fff";
                    ctx.font = `${this.width * 0.5}px Orbitron`;
                    ctx.fillText("GOBAK", this.currentX - this.width/2, this.currentY - this.height - 5);
                } else {
                    ctx.fillStyle = "#00d2ff";
                    ctx.shadowColor = "#00d2ff";
                    ctx.fillRect(this.currentX - this.width/2, this.currentY - this.height, this.width, this.height);
                }
            }
        }

        function spawnObstacle() {
            if (!isGameOver && Math.random() > 0.96) {
                obstacles.push(new Obstacle());
            }
        }

        function drawRoad() {
            ctx.strokeStyle = "#00ff41";
            ctx.lineWidth = 2;
            ctx.beginPath();
            // Yol sınırları
            ctx.moveTo(canvas.width * 0.45, canvas.height * 0.4);
            ctx.lineTo(0, canvas.height);
            ctx.moveTo(canvas.width * 0.55, canvas.height * 0.4);
            ctx.lineTo(canvas.width, canvas.height);
            ctx.stroke();
        }

        function checkCollision(obs) {
            if (obs.z > 350 && obs.z < 420 && obs.lane === playerLane) {
                if (obs.isGobak) {
                    score += 100;
                    scoreEl.innerText = score;
                    obs.z = 1000; // Ekrandan çıkar
                    speed += 0.1;
                } else {
                    isGameOver = true;
                    gameOverEl.style.display = "block";
                }
            }
        }

        function update() {
            if (isGameOver) return;

            ctx.fillStyle = "rgba(0, 0, 0, 0.2)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawRoad();
            spawnObstacle();

            obstacles.forEach((obs, index) => {
                obs.update();
                obs.draw();
                checkCollision(obs);
                if (obs.currentY > canvas.height) {
                    obstacles.splice(index, 1);
                    score += 10;
                    scoreEl.innerText = score;
                }
            });

            // Oyuncuyu çiz (Neon bir üçgen/ok)
            player.x = lanes[playerLane];
            ctx.fillStyle = "#00ff41";
            ctx.shadowColor = "#00ff41";
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.moveTo(player.x, player.y);
            ctx.lineTo(player.x - 30, player.y + 60);
            ctx.lineTo(player.x + 30, player.y + 60);
            ctx.closePath();
            ctx.fill();

            requestAnimationFrame(update);
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === "ArrowLeft" || e.key === "a") playerLane = Math.max(0, playerLane - 1);
            if (e.key === "ArrowRight" || e.key === "d") playerLane = Math.min(2, playerLane + 1);
            if (e.key === "r" && isGameOver) {
                isGameOver = false;
                score = 0;
                speed = 8;
                obstacles = [];
                gameOverEl.style.display = "none";
                update();
            }
        });

        update();
    </script>
</body>
</html>
