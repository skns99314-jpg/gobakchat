<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOBAK CHAT | SOON</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* --- Temel ve Reset --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Poppins', sans-serif;
            color: white;
        }

        /* --- TAMAMEN YENİ ARKA PLAN (Asla Gitmez) --- */
        .fullscreen-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background-color: #a00000; /* Bayrak kırmızısı */
            overflow: hidden;
        }

        /* Gerçek Dalgalanma Efekti İçin Katman */
        .flag-wave-container {
            position: absolute;
            width: 200%; /* Daha geniş, dalga için yer kalsın */
            height: 100%;
            top: 0;
            left: -50%;
            background-image: 
                /* Karartma Gradineti */
                linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.8) 100%),
                /* TÜRK BAYRAĞI GÖRSELİ (Base64 - Kodun İçinde) */
                url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMjAwIDgwMCI+PHBhdGggZmlsbD0iI2UzMGExMCIgZD0iTTAgMGgxMjAwdjg4MEgwWiIvPjxjaXJjbGUgY3g9IjQyNSIgY3k9IjQwMCIgcj0iMjAwIiBmaWxsPSIjZmZmIi8+PGNpcmNsZSBjeD0iNDc1IiBjeT0iNDAwIiByPSIxNjAiIGZpbGw9IiNlMzBhMTAiLz48cG9seWdvbiBmaWxsPSIjZmZmIiBwb2ludHM9Ijc0MCw0MDAgNjU4LDMzMiA2NTgsNDY4IDc5Miw0MDAgNjk2LDMyNSA2OTYsNDc1Ii8+PC9zdmc+');
            background-size: cover;
            background-position: center;
            
            /* CSS Dalgalanma Maskesi */
            -webkit-mask-image: linear-gradient(125deg, #000 25%, rgba(0,0,0,0.2) 50%, #000 75%);
            mask-image: linear-gradient(125deg, #000 25%, rgba(0,0,0,0.2) 50%, #000 75%);
            -webkit-mask-size: 400% 100%;
            mask-size: 400% 100%;
            
            animation: flagWave 6s linear infinite;
        }

        @keyframes flagWave {
            0% { -webkit-mask-position: 100% 0%; mask-position: 100% 0%; }
            100% { -webkit-mask-position: 0% 0%; mask-position: 0% 0%; }
        }

        /* --- Partikül Efekti (Yazı Arkası) --- */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* --- İçerik Konteyneri --- */
        .main-content {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            z-index: 1;
        }

        /* Logo/Başlık */
        h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 6rem;
            font-weight: 700;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 10px;
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.6), 0 0 30px #ff0000;
            animation: titlePulse 3s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.02); opacity: 0.9; }
        }

        .status-tag {
            font-family: 'Oswald', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 15px;
            color: #ff4d4d;
            margin-bottom: 50px;
            text-transform: uppercase;
        }

        /* --- GELİŞMİŞ GERİ SAYIM --- */
        #countdown-container {
            display: flex;
            gap: 25px;
            padding: 40px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 20px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
        }

        .time-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            min-width: 110px;
        }

        .time-val {
            font-family: 'Oswald', sans-serif;
            font-size: 4.5rem;
            font-weight: 700;
            color: #fff;
            line-height: 1;
            text-shadow: 0 0 20px #ff0000;
        }

        /* Rakamların altındaki parlama */
        .time-val::after {
            content: '';
            position: absolute;
            bottom: 25px;
            width: 80%;
            height: 5px;
            background: #ff0000;
            border-radius: 10px;
            box-shadow: 0 0 15px #ff0000;
            opacity: 0.7;
        }

        .time-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            color: #aaa;
            letter-spacing: 3px;
            margin-top: 10px;
        }

        /* --- İmza --- */
        .by-tag {
            margin-top: 60px;
            font-size: 1rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 2px;
        }
        
        .by-tag strong {
            color: #fff;
            font-weight: 600;
            text-shadow: 0 0 5px #fff;
        }

        /* --- MOBİL UYUMLULUK --- */
        @media (max-width: 768px) {
            h1 { font-size: 3.5rem; letter-spacing: 5px; }
            .status-tag { font-size: 1.2rem; letter-spacing: 8px; }
            #countdown-container { gap: 10px; padding: 20px; }
            .time-block { min-width: 70px; }
            .time-val { font-size: 2.8rem; }
            .time-val::after { bottom: 15px; }
            .time-label { font-size: 0.7rem; letter-spacing: 1px; }
        }
    </style>
</head>
<body>

    <div class="fullscreen-bg">
        <div class="flag-wave-container"></div>
    </div>

    <div id="particles-js"></div>

    <div class="main-content">
        <h1>GOBAK CHAT</h1>
        <div class="status-tag">YAKINDA</div>

        <div id="countdown-container">
            <div class="time-block">
                <span class="time-val" id="days">00</span>
                <span class="time-label">GÜN</span>
            </div>
            <div class="time-block">
                <span class="time-val" id="hours">00</span>
                <span class="time-label">SAAT</span>
            </div>
            <div class="time-block">
                <span class="time-val" id="minutes">00</span>
                <span class="time-label">DAKİKA</span>
            </div>
            <div class="time-block">
                <span class="time-val" id="seconds">00</span>
                <span class="time-label">SANİYE</span>
            </div>
        </div>

        <div class="by-tag">By: <strong>ömerbabapiromax</strong></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script>
        // --- 1. Geri Sayım Mantığı ---
        // Hedef süre: Şu andan itibaren 5 gün
        const targetDate = new Date();
        targetDate.setDate(targetDate.getDate() + 5);

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            // Zaman hesaplamaları
            const d = Math.floor(distance / (1000 * 60 * 60 * 24));
            const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((distance % (1000 * 60)) / 1000);

            // Ekrana yazdırma
            document.getElementById("days").innerText = d < 10 ? "0" + d : d;
            document.getElementById("hours").innerText = h < 10 ? "0" + h : h;
            document.getElementById("minutes").innerText = m < 10 ? "0" + m : m;
            document.getElementById("seconds").innerText = s < 10 ? "0" + s : s;

            // Süre bittiğinde
            if (distance < 0) {
                clearInterval(interval);
                document.getElementById("countdown-container").innerHTML = "<h1 style='font-size:3rem; color:#ff4d4d'>CHAT AÇILDI!</h1>";
            }
        }
        const interval = setInterval(updateCountdown, 1000);
        updateCountdown(); // İlk açılışta çalıştır

        // --- 2. Partikül Efekti Ayarı ---
        particlesJS('particles-js', {
            "particles": {
                "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": ["#ffffff", "#ff0000"] }, // Beyaz ve Kırmızı partiküller
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5, "random": true },
                "size": { "value": 3, "random": true },
                "line_linked": { "enable": false }, // Çizgileri kapat, daha temiz
                "move": { "enable": true, "speed": 1, "direction": "top", "random": true, "straight": false, "out_mode": "out" }
            },
            "interactivity": { "detect_on": "canvas", "events": { "onhover": { "enable": false }, "onclick": { "enable": false } } },
            "retina_detect": true
        });
    </script>
</body>
</html>
