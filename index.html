<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Terminali</title>
    <style>
        /* Temel sıfırlamalar ve siyah arka plan */
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden; /* Kaydırma çubuklarını gizler */
            font-family: 'Courier New', Courier, monospace;
        }
        
        canvas {
            display: block; /* Canvas etrafındaki varsayılan boşluğu kaldırır */
        }

        /* Arka planın üzerine eklenecek içerik için örnek bir katman */
        .merkez-icerik {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #0f0;
            text-align: center;
            text-shadow: 0 0 15px #0f0, 0 0 30px #0f0; /* Neon parlama efekti */
            pointer-events: none; /* Fare tıklamalarının altındaki canvas'a geçmesine izin verir */
            z-index: 10;
        }
    </style>
</head>
<body>

    <!-- Üzerine yazacağın içerik -->
    <div class="merkez-icerik">
        <h1>SİSTEME ERİŞİM SAĞLANDI</h1>
        <p>Bağlantı şifrelendi...</p>
    </div>

    <!-- Matrix animasyonunun oynayacağı tuval -->
    <canvas id="matrixArkaplan"></canvas>

    <script>
        const canvas = document.getElementById('matrixArkaplan');
        const ctx = canvas.getContext('2d');

        // Canvas boyutlarını tam ekran yap
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Orijinal Matrix filmindeki gibi Japonca Katakana karakterleri, Latin harfleri ve rakamlar
        const karakterler = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()_+ｦｧｨｩｪｫｬｭｮｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ';
        const karakterDizisi = karakterler.split('');

        const fontBoyutu = 16;
        const sutunlar = canvas.width / fontBoyutu; // Ekran genişliğine göre sütun sayısı hesaplama

        // Her sütun için düşen damlaların Y koordinatını tutan dizi
        const damlalar = [];
        for (let i = 0; i < sutunlar; i++) {
            damlalar[i] = 1;
        }

        function matrixCiz() {
            // Siyah arka planı hafif saydam çizerek eski karakterlerin yavaşça silinmesini (kuyruk efekti) sağla
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Gelişmiş "Glow" (Parlama) efekti ayarları
            ctx.shadowBlur = 3;
            ctx.shadowColor = '#0F0';
            ctx.fillStyle = '#0F0'; // Parlak Matrix yeşili
            ctx.font = fontBoyutu + 'px monospace';

            for (let i = 0; i < damlalar.length; i++) {
                // Rastgele bir karakter seç
                const rastgeleKarakter = karakterDizisi[Math.floor(Math.random() * karakterDizisi.length)];
                
                // Karakteri ekrana yazdır (X koordinatı: sütun sırası, Y koordinatı: damla seviyesi)
                ctx.fillText(rastgeleKarakter, i * fontBoyutu, damlalar[i] * fontBoyutu);

                // Damla ekranın en altına ulaştıysa ve rastgele bir ihtimal gerçekleşirse damlayı en başa sar
                // Math.random() > 0.975 ile damlaların farklı zamanlarda başa dönmesini sağlıyoruz
                if (damlalar[i] * fontBoyutu > canvas.height && Math.random() > 0.975) {
                    damlalar[i] = 0;
                }

                // Damlayı bir birim aşağı kaydır
                damlalar[i]++;
            }
        }

        // Animasyonu saniyede ~30 kare (33 milisaniye) hızında çalıştır
        setInterval(matrixCiz, 33);

        // Tarayıcı penceresi yeniden boyutlandırıldığında canvas'ı uyarla
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            // Sütun sayısını yeniden hesapla ve yeni sütunlar eklendiyse onlara da damla ata
            const yeniSutunlar = canvas.width / fontBoyutu;
            for (let i = damlalar.length; i < yeniSutunlar; i++) {
                damlalar[i] = 1;
            }
        });
    </script>
</body>
</html>
