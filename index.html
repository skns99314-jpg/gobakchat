<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #020202; /* Tam siyah yerine çok koyu bir gri/yeşil alt tonu */
            overflow: hidden;
        }

        canvas {
            display: block;
        }

        /* Eski tip Hacker CRT Monitör Efekti */
        .crt-ekran {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* Tarama çizgileri (Scanlines) */
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none; /* Farenin canvas ile etkileşime girmesine izin ver */
            z-index: 10;
            /* Monitör köşelerindeki karanlık vinyet efekti */
            box-shadow: inset 0 0 100px rgba(0, 200, 0, 0.15); 
        }
    </style>
</head>
<body>

    <!-- Monitör efekti katmanı -->
    <div class="crt-ekran"></div>
    
    <!-- Ana veri akışı -->
    <canvas id="hackerArkaplan"></canvas>

    <script>
        const canvas = document.getElementById('hackerArkaplan');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Binary, Hex kodları ve özel karakterlerin karışımı
        const karakterler = '0101010101010101010101ABCDEF0123456789!@#$%>?/;';
        const karakterDizisi = karakterler.split('');

        const fontBoyutu = 14;
        const sutunlar = canvas.width / fontBoyutu;

        const damlalar = [];
        const hizlar = []; // Her veri sütununun kendi hızı olacak

        // Başlangıç değerlerini ata
        for (let i = 0; i < sutunlar; i++) {
            damlalar[i] = Math.random() * -100; // Ekrana girmeden önce rastgele bir yükseklikte başlasınlar
            hizlar[i] = Math.random() * 0.7 + 0.3; // Standarttan farklı, rastgele hızlar
        }

        // Fare etkileşimini dinle
        let fareX = -100;
        let fareY = -100;
        window.addEventListener('mousemove', (e) => {
            fareX = e.clientX;
            fareY = e.clientY;
        });
        window.addEventListener('mouseout', () => {
            fareX = -100;
            fareY = -100;
        });

        function ekranCiz() {
            // Eski izleri silerken koyu bir iz bırak (kuyruk efekti)
            ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.font = 'bold ' + fontBoyutu + 'px "Courier New", monospace';

            for (let i = 0; i < damlalar.length; i++) {
                const rastgeleKarakter = karakterDizisi[Math.floor(Math.random() * karakterDizisi.length)];
                
                const x = i * fontBoyutu;
                const y = damlalar[i] * fontBoyutu;

                // Farenin veriye olan uzaklığını ölç
                const mesafeX = Math.abs(x - fareX);
                const mesafeY = Math.abs(y - fareY);
                
                // Eğer fare yakınlardaysa veriyi "boz" (kırmızı glitch)
                if (mesafeX < 60 && mesafeY < 60) {
                    ctx.fillStyle = '#ff2a2a'; 
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#ff2a2a';
                } 
                // Bazen rastgele bir kod deşifre ediliyormuş gibi anlık beyaz parlasın
                else if (Math.random() > 0.985) {
                    ctx.fillStyle = '#ffffff';
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#ffffff';
                } 
                // Standart hacker yeşili
                else {
                    ctx.fillStyle = '#0fa'; // Hafif neon bir yeşil/cyan karışımı
                    ctx.shadowBlur = 3;
                    ctx.shadowColor = '#0fa';
                }

                ctx.fillText(rastgeleKarakter, x, y);

                // Veri ekranın altına indiğinde
                if (y > canvas.height && Math.random() > 0.975) {
                    damlalar[i] = 0; // Başa sar
                    hizlar[i] = Math.random() * 0.7 + 0.3; // Hızını değiştir (dinamik akış)
                }

                // Kendi hızına göre aşağı düşmeye devam etsin
                damlalar[i] += hizlar[i];
            }
            
            // Animasyonu en yüksek performansta (60FPS) çalıştır
            requestAnimationFrame(ekranCiz);
        }

        // Sistemi başlat
        ekranCiz();

        // Pencere boyutu değiştiğinde tepki ver
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            const yeniSutunlar = canvas.width / fontBoyutu;
            for (let i = damlalar.length; i < yeniSutunlar; i++) {
                damlalar[i] = Math.random() * -100;
                hizlar[i] = Math.random() * 0.7 + 0.3;
            }
        });
    </script>
</body>
</html>
