<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>PROJE_SUNUMU_V1</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        
        /* MEB ENGELİNDEN KAÇIŞ TÜNELİ */
        #proxy-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ÖĞRETMEN GELİRSE DİYE GİZLİ "EBA" BUTONU (Sağ üst köşe) */
        #panic {
            position: fixed;
            top: 0; right: 0; width: 50px; height: 50px;
            z-index: 9999; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="panic" onclick="window.location.href='https://www.eba.gov.tr'"></div>

    <!-- TIKTOK'U MEB'DEN GİZLEYEREK ÇEKEN TÜNEL -->
    <iframe 
        id="proxy-frame" 
        src="https://api.allorigins.win/raw?url=https://www.tiktok.com"
        allowfullscreen>
    </iframe>

    <script>
        // MEB'in iframe içindeki TikTok'u görmesini zorlaştıran ek katman
        console.log("Bağlantı güvenli tünel üzerinden sağlanıyor...");
        
        // Eğer tahtada dokunmatik sıkıntısı olursa diye tam ekran modu
        document.body.addEventListener('dblclick', () => {
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
        });
    </script>
</body>
</html>
