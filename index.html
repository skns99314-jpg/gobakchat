<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUBALAK DOMINATION</title>
    <style>
        body {
            background-color: #000;
            color: #00ff00; /* Hacker yeşili */
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            word-wrap: break-word;
            line-height: 1.2;
        }

        #flood-container {
            font-size: 14px;
            font-weight: bold;
            text-shadow: 0 0 5px #00ff00;
        }

        .count-marker {
            color: #fe2c55; /* TikTok kırmızısı vurgu */
            margin-right: 10px;
        }

<script>
    let counter = 1;
    const container = document.getElementById('flood-container');
    const totalDisplay = document.getElementById('total');

    // Saniyede 40 kere yazdırma ayarı (1000ms / 40 = 25ms)
    const floodSpeed = 2; 

    function startFlooding() {
        setInterval(() => {
            // Yeni mesajı oluştur
            const msg = document.createElement('div');
            msg.innerHTML = `<span class="count-marker">[#${counter}]</span> GOBAK BABA NO 1 - https://gobakchat.xyz - ${counter}`;
            
            // Konteynıra ekle
            container.appendChild(msg);
            
            // İstatistikleri güncelle
            totalDisplay.innerText = counter;
            counter++;

            // Ekranı otomatik aşağı kaydır
            window.scrollTo(0, document.body.scrollHeight);

            // Tarayıcıyı kasmaması için çok aşırı (mesela 50000) mesajdan sonra temizlik yapabilirsin 
            // ama "sonsuza dek" dediğin için dokunmuyorum.
        }, floodSpeed);
    }

    // Siteye girince direkt başlar
    window.onload = () => {
        console.log("Gubalak sistemi tetiklendi. Hız: 40 msg/sec");
        startFlooding();
    };
</script>

</body>
</html>
