<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>GOBAK_TIKTOK_PLAYER_V9</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap');
        body {
            margin: 0; background: #010101;
            display: flex; flex-direction: column; align-items: center;
            font-family: 'Orbitron', sans-serif; color: #fff;
        }
        .header { margin: 20px; color: #fe2c55; text-shadow: 0 0 10px #fe2c55; }
        
        /* GERÇEK PLAYER KUTUSU */
        #video-stage {
            width: 360px; height: 640px;
            background: #111; border: 4px solid #fe2c55;
            border-radius: 15px; overflow: hidden;
            position: relative; box-shadow: 0 0 30px rgba(254, 44, 85, 0.3);
        }

        iframe { width: 100%; height: 100%; border: none; }

        .input-box { margin: 20px; }
        input {
            padding: 12px; background: #222; border: 1px solid #fe2c55;
            color: #fff; width: 250px; border-radius: 5px;
        }
        button {
            padding: 12px 20px; background: #fe2c55; border: none;
            color: #fff; cursor: pointer; border-radius: 5px; font-weight: bold;
        }
    </style>
</head>
<body>

    <h1 class="header">GOBAK_PHANTOM TV</h1>

    <div id="video-stage">
        <div id="placeholder" style="padding: 100px 20px; text-align: center;">
            VIDEO ID GİRİN VE BAŞLATIN
        </div>
    </div>

    <div class="input-box">
        <input type="text" id="targetId" placeholder="Örn: 7367382291...">
        <button onclick="playNow()">BAŞLAT</button>
    </div>

    <p style="font-size: 10px; color: #555;">Kendi bilgisayarında tam erişim modu aktif.</p>

    <script>
        function playNow() {
            let input = document.getElementById('targetId').value;
            let videoId = "";

            // Linkten ID'yi ayıkla
            if(input.includes("video/")) {
                videoId = input.split("video/")[1].split("?")[0];
            } else {
                videoId = input;
            }

            if(videoId.length > 5) {
                const stage = document.getElementById('video-stage');
                // TikTok'un kısıtlamasız "v.2" player yapısını kullanıyoruz
                stage.innerHTML = `
                    <iframe 
                        src="https://www.tiktok.com/player/v1/${videoId}?autoplay=1" 
                        allow="autoplay; fullscreen" 
                        allowfullscreen>
                    </iframe>`;
            } else {
                alert("Lütfen geçerli bir Video ID gir!");
            }
        }
    </script>
</body>
</html>
