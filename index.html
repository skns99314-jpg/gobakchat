<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOBAK CHAT | SOON</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://upload.wikimedia.org/wikipedia/commons/b/b4/Flag_of_Turkey.svg') center/cover no-repeat fixed;
            color: white;
            overflow: hidden;
        }

        .container {
            text-align: center;
            backdrop-filter: blur(8px);
            background: rgba(255, 255, 255, 0.1);
            padding: 50px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        h1 {
            font-size: 4rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 5px;
            background: linear-gradient(to right, #ffffff, #ff0000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: glow 2s ease-in-out infinite alternate;
        }

        h2 {
            font-size: 1.5rem;
            letter-spacing: 10px;
            color: #ddd;
            margin-bottom: 30px;
        }

        .social-icons {
            margin-top: 20px;
        }

        .social-icons a {
            color: white;
            font-size: 1.5rem;
            margin: 0 15px;
            text-decoration: none;
            transition: 0.3s;
        }

        .social-icons a:hover {
            color: #ff0000;
            transform: scale(1.2);
        }

        .creator-tag {
            margin-top: 40px;
            font-size: 0.9rem;
            color: #aaa;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #fff, 0 0 20px #ff0000; }
            to { text-shadow: 0 0 20px #fff, 0 0 30px #ff0000; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>GOBAK CHAT</h1>
        <h2>YAKINDA SİZLERLE</h2>
        
        <div class="social-icons">
            <a href="#"><i class="fab fa-discord"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-github"></i></a>
        </div>

        <div class="creator-tag">
            By: <strong>ömerbabapiromax</strong>
        </div>
    </div>

</body>
</html>
