<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>FEN_PROJESI_DENEY_V4</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* MEB MASKESİ - Üst Bar */
        #meb-bar {
            height: 40px; background: #1a5c96; color: white;
            display: flex; align-items: center; padding: 0 20px;
            font-size: 14px; font-weight: bold; z-index: 100; position: relative;
        }

        #bypass-engine {
            width: 100%;
            height: calc(100% - 40px);
            border: none;
        }

        /* HOCA GELİRSE ACİL DURUM BUTONU (SOL ÜSTTEKİ LOGO) */
        #logo { cursor: pointer; }
    </style>
</head>
<body>

    <div id="meb-bar">
        <span id="logo" onclick="panic()">T.C. MEB | EĞİTİM MATERYALLERİ</span>
    </div>

    <!-- TIKTOK KEŞFET MOTORU -->
    <iframe 
        id="bypass-engine"
        src="https://www.tiktok.com/embed/v2/explore?is_copy_url=true&is_from_webapp=1"
        allow="autoplay; encrypted-media; fullscreen; picture-in-picture"
        allowfullscreen>
    </iframe>

    <script>
        // ACİL DURUM FONKSİYONU
        function panic() {
            window.location.href = "https://eba.gov.tr";
        }

        // AKILLI TAHTA DOKUNMATİK AYARI
        document.addEventListener('touchstart', function(e) {
            // Dokunmatik hassasiyetini artırmak için boş işlem
        }, {passive: true});

        console.log("GOBAK_SYSTEM: Tünel aktif.");
    </script>
</body>
</html>
