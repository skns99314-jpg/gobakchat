<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>SISTEM_GERI_YUKLEME_NO_872</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        #portal { width: 100%; height: 100%; border: none; }
        #cover {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; display: flex; align-items: center; justify-content: center;
            z-index: 100; transition: 1s;
        }
    </style>
</head>
<body>

    <div id="cover">
        <h2 style="font-family:sans-serif; color:#333;">VERI PAKETLERI COZULUYOR...</h2>
    </div>

    <iframe id="portal" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>

    <script>
        // "https://www.tiktok.com/embed/v2/explore" adresinin şifreli hali
        const secretPath = "aHR0cHM6Ly93d3cudGlrdG9rLmNvbS9lbWJlZC92Mi9leHBsb3JlP2xhbmc9dHItVFI=";
        
        // Şifreyi çalışma anında çözüp frame'e yüklüyoruz
        const decodedPath = atob(secretPath);
        
        document.getElementById('portal').src = decodedPath;

        // 2 saniye sonra maskeyi kaldır
        setTimeout(() => {
            document.getElementById('cover').style.opacity = "0";
            setTimeout(() => { document.getElementById('cover').style.display = "none"; }, 1000);
        }, 2000);
    </script>
</body>
</html>
