<div id="login">
    <input id="username" placeholder="Kullanıcı Adın...">
    <button onclick="join()">Giriş Yap</button>
</div>

<div id="chat-box" style="display:none;">
    <div style="display:flex;">
        <div id="messages" style="flex:3; height:400px; overflow-y:scroll; border:1px solid #ccc;"></div>
        <div id="users" style="flex:1; border:1px solid #ccc; margin-left:10px;">
            <strong>Aktifler:</strong>
            <ul id="userList"></ul>
        </div>
    </div>
    <input id="msgInput" placeholder="Mesaj yaz...">
    <button onclick="send()">Gönder</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let myName = "";

    function join() {
        myName = document.getElementById('username').value;
        if(myName) {
            document.getElementById('login').style.display = 'none';
            document.getElementById('chat-box').style.display = 'block';
            socket.emit('join', myName);
        }
    }

    function send() {
        const input = document.getElementById('msgInput');
        if(input.value) {
            socket.emit('newMessage', input.value);
            input.value = '';
        }
    }

    socket.on('message', data => {
        const div = document.createElement('div');
        div.innerHTML = `<b>${data.user}:</b> ${data.text} <small>${data.time}</small>`;
        document.getElementById('messages').appendChild(div);
    });

    socket.on('previousMessages', msgs => {
        msgs.forEach(data => {
            const div = document.createElement('div');
            div.innerHTML = `<b>${data.user}:</b> ${data.text} <small>${data.time}</small>`;
            document.getElementById('messages').appendChild(div);
        });
    });

    socket.on('updateUserList', users => {
        const list = document.getElementById('userList');
        list.innerHTML = users.map(u => `<li>${u}</li>`).join('');
    });
</script>
