<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Cyber Grid</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            font-family: 'Consolas', 'Courier New', monospace;
        }

        canvas {
            display: block;
            filter: contrast(1.2) brightness(1.1); /* Renkleri daha keskin yap */
        }

        /* Ekrandaki statik parazit efekti */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 5;
        }

        /* Köşelerdeki hafif kararma */
        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 50%, rgba(0, 0, 0, 0.8) 150%);
            pointer-events: none;
            z-index: 6;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>
    <div class="vignette"></div>
    <canvas id="matrixCanvas"></canvas>

    <script>
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Karakter havuzu: Matrix + Hex + Binary
        const alphabet = "日한0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZﾊﾐﾋｰｳｼﾅﾓﾆｻﾜﾂｵﾘｱﾎﾃﾏｹﾒｴｶｷﾑﾕﾗｾﾈｽﾀﾇﾍ";
        
        const fontSize = 16;
        const columns = canvas.width / fontSize;

        // Her sütun için özel bir obje oluşturuyoruz (daha fazla kontrol için)
        const rainDrops = [];
        for (let x = 0; x < columns; x++) {
            rainDrops[x] = {
                y: Math.random() * -canvas.height, // Rastgele başlangıç yüksekliği
                speed: Math.random() * 2 + 1,      // Her sütun farklı hızda
                chars: []                          // Kendi karakter geçmişini tutabilir (opsiyonel)
            };
        }

        const draw = () => {
            // Arka planı hafif şeffaf siyahla kapla (iz bırakma efekti)
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < rainDrops.length; i++) {
                // Rastgele karakter seç
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                
                // Renk katmanları
                // 1. En öndeki karakter (Beyazımsı yeşil - Parlayan uç)
                ctx.fillStyle = '#e0ffe0';
                ctx.font = `bold ${fontSize}px monospace`;
                ctx.shadowBlur = 8;
                ctx.shadowColor = '#00ff41';
                ctx.fillText(text, i * fontSize, rainDrops[i].y * fontSize);

                // 2. Takip eden gövde karakterleri (Matrix Yeşili)
                ctx.fillStyle = '#00ff41';
                ctx.shadowBlur = 2;
                // Bir önceki karakteri çiz (daha sönük)
                ctx.fillText(alphabet.charAt(Math.random() * alphabet.length), i * fontSize, (rainDrops[i].y - 1) * fontSize);

                // 3. Çok daha sönük arka plan karakterleri (Derinlik hissi)
                ctx.fillStyle = '#003300';
                ctx.shadowBlur = 0;
                ctx.fillText(text, i * fontSize, (rainDrops[i].y - 5) * fontSize);

                // Hareketi güncelle
                if (rainDrops[i].y * fontSize > canvas.height && Math.random() > 0.975) {
                    rainDrops[i].y = 0;
                }
                
                rainDrops[i].y += rainDrops[i].speed;
            }
        };

        // Pencere yeniden boyutlandırma
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Akıcılık için 30-60 FPS arası döngü
        setInterval(draw, 35);
    </script>
</body>
</html>
