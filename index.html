<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOBAK_PHANTOM // NEURAL_LINK</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500;700&family=Orbitron:wght@400;900&family=Rajdhani:wght@300;500;700&display=swap');

        :root {
            --neon-green: #00ff41;
            --neon-purple: #bc13fe;
            --neon-blue: #00d2ff;
            --alert-red: #ff003c;
            --bg-black: #020202;
            --glass: rgba(0, 20, 0, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; outline: none; }

        body {
            background-color: var(--bg-black);
            color: var(--neon-green);
            font-family: 'Fira Code', monospace;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- SİBER ARKA PLAN (MATRIX + PARALLAX) --- */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0; z-index: 1;
            filter: blur(1px);
        }

        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 2px, 3px 100%;
            z-index: 10;
            pointer-events: none;
        }

        /* --- ANA GİRİŞ MERKEZİ --- */
        .neural-link-container {
            position: relative;
            z-index: 5;
            width: 900px;
            height: 600px;
            display: flex;
            background: var(--glass);
            border: 1px solid var(--neon-purple);
            box-shadow: 0 0 50px rgba(188, 19, 254, 0.2);
            backdrop-filter: blur(15px);
            clip-path: polygon(10% 0, 100% 0, 100% 90%, 90% 100%, 0 100%, 0 10%);
        }

        /* --- SOL PANEL: DURUM VE İSTATİSTİK --- */
        .side-bar {
            width: 300px;
            border-right: 1px solid var(--neon-purple);
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            font-family: 'Rajdhani', sans-serif;
        }

        .stat-box { margin-bottom: 20px; }
        .stat-label { font-size: 0.7rem; color: var(--neon-purple); text-transform: uppercase; }
        .stat-value { font-size: 1.2rem; color: var(--neon-blue); font-weight: bold; }
        
        .progress-mini {
            width: 100%; height: 4px;
            background: rgba(188, 19, 254, 0.1);
            margin-top: 5px;
            position: relative;
        }
        .progress-fill {
            height: 100%; background: var(--neon-blue);
            width: 0%; transition: width 0.3s;
            box-shadow: 0 0 10px var(--neon-blue);
        }

        /* --- MERKEZ: GİRİŞ VE ANİMASYON --- */
        .main-auth {
            flex-grow: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .phantom-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-purple), 0 0 20px var(--neon-purple);
            margin-bottom: 50px;
            letter-spacing: 10px;
            animation: glitch-text 3s infinite;
        }

        @keyframes glitch-text {
            0% { transform: skew(0deg); }
            2% { transform: skew(10deg); color: var(--neon-blue); }
            4% { transform: skew(-10deg); color: var(--alert-red); }
            6% { transform: skew(0deg); }
        }

        .input-wrapper {
            width: 100%;
            max-width: 400px;
            margin-bottom: 30px;
        }

        .cyber-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--neon-green);
            padding: 15px;
            color: var(--neon-green);
            font-family: 'Fira Code';
            font-size: 1rem;
            text-align: center;
            letter-spacing: 3px;
            transition: 0.3s;
        }

        .cyber-input:focus {
            box-shadow: 0 0 20px var(--neon-green);
            border-color: #fff;
        }

        .access-btn {
            background: none;
            border: 2px solid var(--neon-purple);
            color: var(--neon-purple);
            padding: 15px 50px;
            font-family: 'Orbitron';
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            cursor: pointer;
            transition: 0.5s;
            position: relative;
            overflow: hidden;
        }

        .access-btn:hover {
            background: var(--neon-purple);
            color: #fff;
            box-shadow: 0 0 40px var(--neon-purple);
        }

        /* --- SAĞ PANEL: LOG VE NETWORK --- */
        .network-panel {
            width: 150px;
            border-left: 1px solid var(--neon-purple);
            display: flex;
            flex-direction: column;
            padding: 10px;
            font-size: 0.6rem;
            overflow: hidden;
        }

        .log-entry { margin-bottom: 5px; opacity: 0.7; }

        /* --- ÖZEL EFEKTLER --- */
        .hud-circle {
            position: absolute;
            border: 1px dashed var(--neon-blue);
            border-radius: 50%;
            animation: rotate 30s linear infinite;
            pointer-events: none;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div class="scanlines"></div>

    <div class="neural-link-container">
        <!-- SOL PANEL -->
        <aside class="side-bar">
            <div class="top-stats">
                <div class="stat-box">
                    <div class="stat-label">System Integrity</div>
                    <div class="stat-value" id="integrity-val">99.9%</div>
                    <div class="progress-mini"><div class="progress-fill" style="width: 99%"></div></div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Neural Latency</div>
                    <div class="stat-value" id="latency-val">4ms</div>
                    <div class="progress-mini"><div class="progress-fill" id="latency-bar" style="width: 10%"></div></div>
                </div>
            </div>
            
            <div class="bottom-stats">
                <div style="font-size: 0.8rem; color: var(--neon-green);">
                    > SESSION: ACTIVE<br>
                    > NODE: GOBAK_PHANTOM<br>
                    > USER: AUTHORIZED
                </div>
            </div>
        </aside>

        <!-- MERKEZ -->
        <main class="main-auth">
            <div class="hud-circle" style="width: 500px; height: 500px; opacity: 0.2;"></div>
            <div class="hud-circle" style="width: 450px; height: 450px; animation-direction: reverse; opacity: 0.1;"></div>
            
            <div class="phantom-logo">GOBAK_PHANTOM</div>
            
            <div class="input-wrapper">
                <input type="text" class="cyber-input" placeholder="NEURAL_IDENTIFIER" id="username">
            </div>
            
            <button class="access-btn" onclick="initiateBreach()">INITIATE BREACH</button>
            
            <div id="status-text" style="margin-top: 20px; font-size: 0.8rem;">Awaiting input...</div>
        </main>

        <!-- SAĞ PANEL -->
        <aside class="network-panel" id="log-panel">
            <!-- Dinamik Loglar Buraya -->
        </aside>
    </div>

    <script>
        // MATRIX & PARTICLE BACKGROUND
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speedX = Math.random() * 3 - 1.5;
                this.speedY = Math.random() * 3 - 1.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = '#bc13fe';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 100; i++) particles.push(new Particle());

        function animate() {
            ctx.fillStyle = 'rgba(2, 2, 2, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        // LOG SİSTEMİ
        const logPanel = document.getElementById('log-panel');
        const logs = [
            "Handshaking...", "Bypassing firewall...", "Neural link established",
            "Fetching kernel...", "Packet sniff active", "Encrypted tunnel open"
        ];

        setInterval(() => {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerText = `[${new Date().toLocaleTimeString()}] ${logs[Math.floor(Math.random()*logs.length)]}`;
            logPanel.prepend(entry);
            if(logPanel.children.length > 20) logPanel.lastChild.remove();
            
            // Random Stats
            document.getElementById('latency-val').innerText = Math.floor(Math.random() * 20) + "ms";
            document.getElementById('latency-bar').style.width = Math.random() * 100 + "%";
        }, 1500);

        // GİRİŞ FONKSİYONU
        function initiateBreach() {
            const user = document.getElementById('username').value;
            const status = document.getElementById('status-text');
            
            if(!user) {
                status.innerText = "ERROR: IDENTIFIER REQUIRED";
                status.style.color = "var(--alert-red)";
                return;
            }

            status.innerText = "SYNCHRONIZING NEURAL WAVES...";
            status.style.color = "var(--neon-blue)";
            
            setTimeout(() => {
                status.innerHTML = `<span style="color:var(--neon-green)">BREACH SUCCESSFUL. WELCOME, ${user.toUpperCase()}.</span>`;
                document.querySelector('.neural-link-container').style.boxShadow = "0 0 100px var(--neon-green)";
                
                // Buraya sitenin ana terminaline yönlendirme veya açılma efekti eklenebilir
                setTimeout(() => {
                    alert("GOBAK_PHANTOM SİSTEMİNE HOŞ GELDİN, " + user);
                }, 1000);
            }, 2500);
        }

        // 50 Fikir Entegrasyon Notları (JS içinde çalışanlar)
        // 1. Koordinat Takibi
        document.addEventListener('mousemove', (e) => {
            const xPercent = (e.clientX / window.innerWidth) * 100;
            const yPercent = (e.clientY / window.innerHeight) * 100;
            document.getElementById('integrity-val').innerText = (99 + Math.random()).toFixed(2) + "%";
        });
    </script>
</body>
</html>
