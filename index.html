<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUBALAK DOMINATION</title>
    <style>
        body {
            background-color: #000;
            color: #00ff00; /* Hacker yeşili */
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 10px;
            overflow-x: hidden;
            word-wrap: break-word;
            line-height: 1.1;
        }

        #flood-container {
            font-size: 12px;
            font-weight: bold;
            text-shadow: 0 0 3px #00ff00;
        }

        .count-marker {
            color: #fe2c55; /* TikTok kırmızısı vurgu */
            margin-right: 5px;
        }
    </style>
</head>
<body>

<div id="flood-container"></div>

<script>
    let counter = 1;
    const container = document.getElementById('flood-container');

    // Saniyede 500 mesaj için gecikme yaklaşık 2ms
    // Ancak tarayıcı her 2ms'de bir ekrana çizim yapamaz.
    // Bu yüzden performansı artırmak için her döngüde 10'arlı mesaj basıyoruz.
    const batchSize = 400; 
    const floodSpeed = 2000; // 1000ms / (500/10) = 20ms

    function startFlooding() {
        setInterval(() => {
            let fragment = document.createDocumentFragment();
            
            for(let i = 0; i < batchSize; i++) {
                const msg = document.createElement('div');
                msg.innerHTML = `<span class="count-marker">[#${counter}]</span> GOBAK BABA NO1 - ${counter}`;
                fragment.appendChild(msg);
                counter++;
            }

            container.appendChild(fragment);

            // Ekranı en aşağı kaydır
            window.scrollTo(0, document.body.scrollHeight);

            // RAM yönetimi: Tarayıcının çökmesini önlemek için 20.000 satırdan sonrasını temizle
            if (container.children.length > 2000000) {
                for (let i = 0; i < batchSize; i++) {
                    container.removeChild(container.firstChild);
                }
            }
        }, floodSpeed);
    }

    window.onload = () => {
        console.log("Gubalak Ultra Speed Mode: Active");
        startFlooding();
    };
</script>

</body>
</html>
